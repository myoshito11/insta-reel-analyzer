<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>レポート管理</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --muted: #8b93a4;
    --accent: #e1306c;
    --accent-2: #f77737;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: radial-gradient(1100px 500px at 85% -10%, #2a1430 0%, var(--bg) 55%);
    color: var(--text);
    line-height: 1.65;
    -webkit-text-size-adjust: 100%;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    backdrop-filter: blur(10px);
    background: rgba(15,17,21,.82);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
  }
  .head-row { display: flex; align-items: center; gap: 10px; max-width: 920px; margin: 0 auto; }
  h1 {
    font-size: 18px; margin: 0; white-space: nowrap;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  main { max-width: 920px; margin: 0 auto; padding: 16px 18px 90px; }
  input, textarea, select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 240px; line-height: 1.6; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
  .btn {
    border: none; border-radius: 10px; padding: 10px 16px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; }
  .btn-ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: #3a1d24; color: #ff8a9b; border: 1px solid #532a34; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .toolbar .grow { flex: 1 1 180px; min-width: 140px; }
  select.filter { width: auto; min-width: 130px; }
  .count { color: var(--muted); font-size: 12px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 15px 16px; margin-bottom: 11px; cursor: pointer; transition: .12s;
  }
  .card:hover { border-color: #3a4150; }
  .card .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 5px; }
  .chip {
    font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px;
    background: linear-gradient(135deg, rgba(225,48,108,.18), rgba(247,119,55,.18));
    border: 1px solid #4a2535; color: #ffb3c7;
  }
  .card .date { font-size: 11px; color: var(--muted); }
  .card .title { font-size: 15px; font-weight: 700; margin: 0 0 4px; }
  .card .snippet { font-size: 13px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .empty .big { font-size: 40px; margin-bottom: 10px; }
  /* FAB */
  .fab {
    position: fixed; right: 20px; bottom: 22px; z-index: 25;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; font-size: 28px; border: none; cursor: pointer;
    box-shadow: 0 8px 24px rgba(225,48,108,.4); display: flex; align-items: center; justify-content: center;
  }
  /* modal */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,.65); padding: 0; overflow: auto;
  }
  .overlay.open { display: block; }
  .sheet {
    max-width: 760px; margin: 24px auto; background: var(--panel);
    border: 1px solid var(--border); border-radius: 16px; padding: 20px;
  }
  @media (max-width: 640px) { .sheet { margin: 0; min-height: 100vh; border-radius: 0; border: none; } }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sheet-head .acts { display: flex; gap: 8px; flex-wrap: wrap; }
  /* rendered markdown */
  .md h1, .md h2, .md h3 { line-height: 1.35; margin: 18px 0 8px; }
  .md h1 { font-size: 21px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .md h2 { font-size: 18px; color: #ffb3c7; }
  .md h3 { font-size: 15px; }
  .md p, .md li { font-size: 14px; }
  .md ul, .md ol { padding-left: 22px; }
  .md table { border-collapse: collapse; width: 100%; font-size: 13px; margin: 10px 0; }
  .md th, .md td { border: 1px solid var(--border); padding: 6px 9px; text-align: left; }
  .md th { background: var(--panel-2); }
  .md code { background: var(--panel-2); padding: 1px 5px; border-radius: 5px; font-size: 13px; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .md blockquote { border-left: 3px solid var(--accent); margin: 10px 0; padding: 2px 12px; color: var(--muted); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #2a2f3a; color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: 13px; z-index: 60; opacity: 0; transition: .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .menu-wrap { position: relative; }
  .menu {
    display: none; position: absolute; right: 0; top: 110%; z-index: 30;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px; min-width: 200px;
  }
  .menu.open { display: block; }
  .menu button {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--text); padding: 9px 10px; border-radius: 7px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .menu button:hover { background: var(--panel-2); }
</style>
</head>
<body>
<header>
  <div class="head-row">
    <h1>📁 レポート管理</h1>
    <div style="flex:1"></div>
    <div class="menu-wrap">
      <button id="menuBtn" class="btn btn-ghost btn-sm">⋯</button>
      <div id="menu" class="menu">
        <button id="exportAcc">📤 表示中のアカウントをまとめて書き出し(.md)</button>
        <button id="copyAcc">📋 表示中のアカウントをまとめてコピー</button>
        <button id="backup">💾 全データをバックアップ(.json)</button>
        <button id="restore">📥 バックアップから復元(.json)</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="toolbar">
    <input id="search" class="grow" placeholder="🔍 タイトル・本文・アカウントで検索" />
    <select id="filterAccount" class="filter"></select>
    <span id="count" class="count"></span>
  </div>
  <div id="list"></div>
  <div id="empty" class="empty" style="display:none">
    <div class="big">📝</div>
    レポートがありません。<br />右下の「＋」から、ChatGPTで書いたレポートを貼り付けて保存しましょう。
  </div>
</main>

<button id="fab" class="fab" title="新規レポート">＋</button>

<!-- 編集モーダル -->
<div id="editOverlay" class="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <strong id="editTitle">新規レポート</strong>
      <div class="acts"><button id="editClose" class="btn btn-ghost btn-sm">閉じる</button></div>
    </div>
    <label>アカウント名</label>
    <input id="e_account" list="accList" placeholder="@example_account" />
    <datalist id="accList"></datalist>
    <div style="display:flex; gap:12px">
      <div style="flex:2"><label>タイトル</label><input id="e_title" placeholder="例：タワマン引きこもり動画の分析" /></div>
      <div style="flex:1"><label>日付</label><input id="e_date" type="date" /></div>
    </div>
    <label>レポート本文（ChatGPTの出力を貼り付け／Markdown対応）</label>
    <textarea id="e_body" placeholder="ChatGPTで書いたレポートをそのまま貼り付け"></textarea>
    <div style="display:flex; gap:8px; margin-top:14px">
      <button id="saveReport" class="btn btn-primary">保存</button>
      <span class="hint" style="align-self:center">保存先はこの端末のブラウザ内。バックアップ推奨。</span>
    </div>
  </div>
</div>

<!-- 閲覧モーダル -->
<div id="viewOverlay" class="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div style="min-width:0">
        <div id="v_meta" class="meta"></div>
        <strong id="v_title" style="font-size:17px"></strong>
      </div>
      <div class="acts">
        <button id="v_copy" class="btn btn-ghost btn-sm">📋</button>
        <button id="v_edit" class="btn btn-ghost btn-sm">編集</button>
        <button id="v_del" class="btn btn-danger btn-sm">削除</button>
        <button id="viewClose" class="btn btn-ghost btn-sm">閉じる</button>
      </div>
    </div>
    <div id="v_body" class="md"></div>
  </div>
</div>

<input id="fileInput" type="file" accept="application/json,.json" hidden />
<div id="toast" class="toast"></div>

<script>
const $ = id => document.getElementById(id);
const STORE = 'reports_v2';
const ALL = '__all__';

const load = () => { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } };
const save = r => localStorage.setItem(STORE, JSON.stringify(r));
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayStr = () => { const d = new Date(); return d.toISOString().slice(0,10); };

let editingId = null;   // 編集中ID（新規はnull）
let viewingId = null;

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

function plain(md) {
  return String(md).replace(/[#>*_`~\-\|]/g, ' ').replace(/\!?\[(.*?)\]\(.*?\)/g, '$1').replace(/\s+/g, ' ').trim();
}
function renderMd(md) {
  if (window.marked) { try { return marked.parse(md); } catch {} }
  return '<pre style="white-space:pre-wrap">' + esc(md) + '</pre>';
}

// ---- 一覧描画 ----
function accounts() { return [...new Set(load().map(r => r.account).filter(Boolean))].sort(); }

function refreshFilter() {
  const accs = accounts();
  const cur = $('filterAccount').value || ALL;
  $('filterAccount').innerHTML = `<option value="${ALL}">すべてのアカウント</option>` +
    accs.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('');
  $('filterAccount').value = accs.includes(cur) || cur === ALL ? cur : ALL;
  // datalist
  $('accList').innerHTML = accs.map(a => `<option value="${esc(a)}">`).join('');
}

function currentList() {
  const q = $('search').value.trim().toLowerCase();
  const acc = $('filterAccount').value;
  return load()
    .filter(r => acc === ALL || r.account === acc)
    .filter(r => !q || (r.title + ' ' + r.account + ' ' + r.body).toLowerCase().includes(q))
    .sort((a, b) => (b.date || '').localeCompare(a.date || '') || b.id - a.id);
}

function render() {
  const items = currentList();
  $('count').textContent = items.length ? `${items.length}件` : '';
  $('empty').style.display = (load().length === 0) ? 'block' : 'none';
  $('list').innerHTML = items.map(r => `
    <div class="card" data-id="${r.id}">
      <div class="meta">
        ${r.account ? `<span class="chip">${esc(r.account)}</span>` : ''}
        <span class="date">${esc(r.date || '')}</span>
      </div>
      <div class="title">${esc(r.title || '無題')}</div>
      <div class="snippet">${esc(plain(r.body).slice(0, 120))}</div>
    </div>`).join('');
}

$('list').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (card) openView(+card.dataset.id);
});
$('search').addEventListener('input', render);
$('filterAccount').addEventListener('change', render);

// ---- 編集モーダル ----
function openEdit(id) {
  editingId = id;
  titleTouched = false; dateTouched = false;
  const r = id ? load().find(x => x.id === id) : null;
  $('editTitle').textContent = id ? 'レポートを編集' : '新規レポート';
  $('e_account').value = r ? r.account : ($('filterAccount').value !== ALL ? $('filterAccount').value : '');
  $('e_title').value = r ? r.title : '';
  $('e_date').value = r ? (r.date || todayStr()) : todayStr();
  $('e_body').value = r ? r.body : '';
  $('editOverlay').classList.add('open');
}
$('fab').addEventListener('click', () => openEdit(null));
$('editClose').addEventListener('click', () => $('editOverlay').classList.remove('open'));

// 本文からタイトル・日付を自動抽出（新規レポート貼り付け時のみ）
let titleTouched = false, dateTouched = false;
$('e_title').addEventListener('input', () => titleTouched = true);
$('e_date').addEventListener('input', () => dateTouched = true);

function extractMeta(body) {
  let title = '', date = '';
  const lines = body.split('\n').map(l => l.trim());
  // タイトル：最初の「…」『…』を優先
  for (const l of lines) {
    const m = l.match(/[「『]([^」』]{2,})[」』]/);
    if (m) { title = m[1]; break; }
  }
  // 無ければ最初の意味のある行（区切り線・記号のみは除外）
  if (!title) {
    for (const l of lines) {
      if (!l || /^[-=⸻─#*•・\s]+$/.test(l)) continue;
      title = l.replace(/^#+\s*/, '').slice(0, 60); break;
    }
  }
  // 日付：投稿日 > ○月○日 > M/D
  const m = body.match(/投稿日[：:]\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/)
         || body.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日/)
         || body.match(/(?:^|\s)(\d{1,2})\/(\d{1,2})(?:\s|$)/);
  if (m) {
    const y = new Date().getFullYear();
    date = `${y}-${String(m[1]).padStart(2, '0')}-${String(m[2]).padStart(2, '0')}`;
  }
  return { title, date };
}

$('e_body').addEventListener('input', () => {
  if (editingId) return; // 編集中の既存レポートには触らない
  const { title, date } = extractMeta($('e_body').value);
  if (!titleTouched && !$('e_title').value && title) $('e_title').value = title;
  if (!dateTouched && date) $('e_date').value = date;
});

$('saveReport').addEventListener('click', () => {
  const body = $('e_body').value.trim();
  if (!body) { toast('本文を入力してください'); return; }
  const reports = load();
  const data = {
    account: $('e_account').value.trim(),
    title: $('e_title').value.trim() || '無題',
    date: $('e_date').value || todayStr(),
    body,
  };
  if (editingId) {
    const i = reports.findIndex(x => x.id === editingId);
    reports[i] = { ...reports[i], ...data, updatedAt: Date.now() };
  } else {
    reports.unshift({ id: Date.now(), ...data, createdAt: Date.now() });
  }
  save(reports);
  $('editOverlay').classList.remove('open');
  refreshFilter(); render();
  toast('保存しました');
});

// ---- 閲覧モーダル ----
function openView(id) {
  const r = load().find(x => x.id === id);
  if (!r) return;
  viewingId = id;
  $('v_meta').innerHTML = (r.account ? `<span class="chip">${esc(r.account)}</span>` : '') +
    `<span class="date">${esc(r.date || '')}</span>`;
  $('v_title').textContent = r.title || '無題';
  $('v_body').innerHTML = renderMd(r.body);
  $('viewOverlay').classList.add('open');
}
$('viewClose').addEventListener('click', () => $('viewOverlay').classList.remove('open'));
$('v_edit').addEventListener('click', () => { $('viewOverlay').classList.remove('open'); openEdit(viewingId); });
$('v_copy').addEventListener('click', () => {
  const r = load().find(x => x.id === viewingId);
  navigator.clipboard.writeText(r.body); toast('コピーしました');
});
$('v_del').addEventListener('click', () => {
  if (!confirm('このレポートを削除しますか？')) return;
  save(load().filter(x => x.id !== viewingId));
  $('viewOverlay').classList.remove('open');
  refreshFilter(); render(); toast('削除しました');
});

// オーバーレイの外側タップで閉じる
[['editOverlay'], ['viewOverlay']].forEach(([id]) => {
  $(id).addEventListener('click', e => { if (e.target.id === id) $(id).classList.remove('open'); });
});

// ---- メニュー（書き出し・バックアップ）----
$('menuBtn').addEventListener('click', e => { e.stopPropagation(); $('menu').classList.toggle('open'); });
document.addEventListener('click', () => $('menu').classList.remove('open'));

function accLabel() {
  const a = $('filterAccount').value;
  return a === ALL ? '全アカウント' : a;
}
function combinedMd() {
  const items = currentList();
  return `# ${accLabel()} レポートまとめ（${items.length}本）\n\n` +
    items.map(r => `## ${r.title}（${r.date || ''}）\nアカウント: ${r.account || '-'}\n\n${r.body}`).join('\n\n---\n\n');
}
$('copyAcc').addEventListener('click', () => {
  navigator.clipboard.writeText(combinedMd()); toast('まとめをコピーしました');
});
$('exportAcc').addEventListener('click', () => {
  downloadFile(combinedMd(), `${accLabel()}_reports.md`, 'text/markdown');
});
$('backup').addEventListener('click', () => {
  downloadFile(JSON.stringify(load(), null, 2), `reports_backup_${todayStr()}.json`, 'application/json');
});
$('restore').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      if (!Array.isArray(incoming)) throw new Error();
      const cur = load();
      const ids = new Set(cur.map(r => r.id));
      const merged = cur.concat(incoming.filter(r => r && r.id && !ids.has(r.id)));
      save(merged); refreshFilter(); render();
      toast(`${merged.length - cur.length}件を取り込みました`);
    } catch { toast('読み込めませんでした（JSON形式を確認）'); }
    $('fileInput').value = '';
  };
  reader.readAsText(file);
});

function downloadFile(content, name, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.replace(/[\\/:*?"<>|]/g, '_');
  a.click();
}

// 起動
refreshFilter();
render();
</script>
</body>
</html>
